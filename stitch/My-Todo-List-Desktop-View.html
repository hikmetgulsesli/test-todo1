<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>My Todo List Desktop View</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2463eb",
                        "background-light": "#f5f5f5",
                        "background-dark": "#111621",
                        "surface": "#ffffff",
                        "surface-dark": "#1e293b",
                        "danger": "#e74c3c",
                        "muted": "#aaaaaa"
                    },
                    fontFamily: {
                        "display": ["Space Grotesk", "sans-serif"],
                        "body": ["DM Sans", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .completed-task {
            text-decoration: line-through;
            color: var(--tw-colors-muted);
        }
    </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-body min-h-screen flex flex-col items-center py-10">
<div class="w-full max-w-2xl bg-surface dark:bg-surface-dark rounded-xl shadow-sm border border-slate-200 dark:border-slate-800 overflow-hidden flex flex-col">
<!-- Header -->
<div class="px-8 py-6 border-b border-slate-100 dark:border-slate-800">
<h1 class="font-display text-2xl font-bold text-slate-900 dark:text-slate-100">My Todo List</h1>
</div>
<!-- Input Area -->
<div class="px-8 py-6 bg-slate-50 dark:bg-slate-900/50">
<div class="flex items-center gap-3">
<input class="flex-1 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-lg px-4 py-3 text-slate-900 dark:text-slate-100 focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent transition-all shadow-sm" placeholder="What needs to be done?" type="text"/>
<button class="bg-primary hover:bg-primary/90 text-white font-medium px-6 py-3 rounded-lg shadow-sm transition-colors flex items-center gap-2">
<span>Add</span>
</button>
</div>
</div>
<!-- Todo List -->
<div class="flex flex-col divide-y divide-slate-100 dark:divide-slate-800 flex-1 overflow-y-auto">
<!-- Todo Item 1 (Active) -->
<div class="flex items-center gap-4 px-8 py-4 group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center justify-center">
<input class="h-5 w-5 rounded-full border-slate-300 dark:border-slate-600 text-primary focus:ring-primary cursor-pointer transition-colors" type="checkbox"/>
</div>
<p class="text-slate-700 dark:text-slate-300 flex-1 truncate text-[15px]">Buy groceries for the week</p>
<button class="text-slate-400 hover:text-danger dark:text-slate-500 dark:hover:text-danger opacity-0 group-hover:opacity-100 transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Todo Item 2 (Active) -->
<div class="flex items-center gap-4 px-8 py-4 group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center justify-center">
<input class="h-5 w-5 rounded-full border-slate-300 dark:border-slate-600 text-primary focus:ring-primary cursor-pointer transition-colors" type="checkbox"/>
</div>
<p class="text-slate-700 dark:text-slate-300 flex-1 truncate text-[15px]">Finish quarterly report presentation</p>
<button class="text-slate-400 hover:text-danger dark:text-slate-500 dark:hover:text-danger opacity-0 group-hover:opacity-100 transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Todo Item 3 (Completed) -->
<div class="flex items-center gap-4 px-8 py-4 group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors bg-slate-50/50 dark:bg-slate-900/20">
<div class="flex items-center justify-center">
<input checked="" class="h-5 w-5 rounded-full border-primary text-primary focus:ring-primary cursor-pointer transition-colors" type="checkbox"/>
</div>
<p class="text-muted flex-1 truncate text-[15px] completed-task">Call mom to wish her happy birthday</p>
<button class="text-slate-400 hover:text-danger dark:text-slate-500 dark:hover:text-danger opacity-0 group-hover:opacity-100 transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
<!-- Todo Item 4 (Active) -->
<div class="flex items-center gap-4 px-8 py-4 group hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="flex items-center justify-center">
<input class="h-5 w-5 rounded-full border-slate-300 dark:border-slate-600 text-primary focus:ring-primary cursor-pointer transition-colors" type="checkbox"/>
</div>
<p class="text-slate-700 dark:text-slate-300 flex-1 truncate text-[15px]">Schedule dentist appointment</p>
<button class="text-slate-400 hover:text-danger dark:text-slate-500 dark:hover:text-danger opacity-0 group-hover:opacity-100 transition-all">
<span class="material-symbols-outlined text-[20px]">close</span>
</button>
</div>
</div>
<!-- Footer -->
<div class="px-8 py-4 bg-slate-50 dark:bg-slate-900 border-t border-slate-100 dark:border-slate-800 flex items-center justify-between text-sm text-slate-500 dark:text-slate-400">
<span>3 items left</span>
<button class="hover:text-slate-800 dark:hover:text-slate-200 transition-colors">Clear Completed</button>
</div>
</div>
</body></html>
